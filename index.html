<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sorry 💖</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffdce6,#dff3ff);
  overflow:hidden;
}

.container{
  width:90%;
  max-width:800px;
  background:rgba(255,255,255,0.85);
  padding:30px;
  border-radius:20px;
  text-align:center;
  position:relative;
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

h1{
  color:#ff6fa8;
}

p{
  color:#444;
}

img{
  width:250px;
  border-radius:15px;
  margin:15px 0;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.pink{
  background:#ff6fa8;
  color:white;
}

.white{
  background:white;
  border:1px solid #ff6fa8;
  color:#ff6fa8;
  position:relative;
  transition:0.2s;
}

.message{
  margin-top:10px;
  color:#ff6fa8;
  font-weight:bold;
}

.hearts{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

.heart{
  position:absolute;
  color:pink;
  animation:float 3s infinite;
  opacity:0.4;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0)}
}
</style>
</head>

<body>

<div class="container">

  <div id="scene"></div>

  <div class="message" id="message"></div>

</div>

<div class="hearts" id="hearts"></div>

<script>
let scene = 1;
let noPos = {x:0,y:0};
let hideNo = false;

const scenes = {
  1:{
    title:"Hey Baby... I'm Sorry 💖",
    text:"I know I hurt your feelings and disrespected you. That was never my intention. You deserve all the love, attention, and care in the world.",
    gif:"https://media.giphy.com/media/Lfi2G7BzY15333JtK1/giphy.gif",
    btn:"Next 💕"
  },
  2:{
    title:"You Trusted Me 💔",
    text:"I know I made mistakes and disappointed you. I truly regret it and I never want to be the reason behind your sadness.",
    gif:"https://media.giphy.com/media/CGEAJEqcVFptYzXACG/giphy.gif",
    btn:"My Promise 💖"
  },
  3:{
    title:"My Promise 💞",
    text:"I promise to always choose you, do better, communicate more, and make sure you always feel loved and appreciated every single day. I love you so much 😭❤️",
    gif:"https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif",
    btn:"Forgive Me? 🥺"
  }
};

function render(){
  const s = document.getElementById("scene");
  const d = scenes[scene];

  if(scene<=3){
    s.innerHTML = `
      <h1>${d.title}</h1>
      <p>${d.text}</p>
      <img src="${d.gif}" />
      <div>
        ${scene>1 ? `<button class="white" onclick="back()">Back</button>` : ""}
        <button class="pink" onclick="next()">${d.btn}</button>
      </div>
    `;
  }

  if(scene===4){
    s.innerHTML = `
      <h1>Can you forgive me? 💗</h1>
      <p>Please give me one more chance 💞</p>
      <img id="gif" style="display:none;width:220px" />
      <div style="position:relative;height:80px">
        <button class="pink" onclick="yes()">Yes 💖</button>
        <button class="white" id="noBtn">No 😢</button>
      </div>
    `;

    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover",()=>{
      noBtn.style.position="absolute";
      noBtn.style.left=Math.random()*70+"%";
      noBtn.style.top=Math.random()*50+"%";
    });
  }
}

function next(){
  scene++;
  render();
}

function back(){
  scene--;
  render();
}

function yes(){
  document.getElementById("gif").style.display="block";
  document.getElementById("gif").src =
  "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif";

  document.getElementById("message").innerText =
  "Thank you, my love 💞 I’ll always cherish you.";

  document.getElementById("noBtn").style.display="none";
}

/* floating hearts */
function hearts(){
  const h = document.getElementById("hearts");
  for(let i=0;i<20;i++){
    let d=document.createElement("div");
    d.className="heart";
    d.innerHTML="💖";
    d.style.left=Math.random()*100+"%";
    d.style.top=Math.random()*100+"%";
    h.appendChild(d);
  }
}

render();
hearts();
</script>

</body>
</html>
